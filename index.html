<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TSV Train">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; connect-src 'self' https://generativelanguage.googleapis.com; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/logo-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/logo-512.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <title>TSVLindau Train-APP</title>
  <link rel="preload" as="font" type="font/woff2" crossorigin href="fonts/inter-latin.woff2">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-head">
      <a href="#/dashboard" class="brand">
        <img src="icons/logo-64.png" srcset="icons/logo-64.png 1x, icons/logo-128.png 2x" width="32" height="32" alt="TSV Lindau Basketball" class="brand-logo" decoding="async">
        <h1 class="brand-text">Train-APP</h1>
      </a>
      <div class="topbar-actions">
        <button class="theme-toggle" type="button" aria-label="Theme wechseln" data-role="theme-toggle">🌙</button>
        <a class="settings-btn" href="#/settings" aria-label="Einstellungen" title="Einstellungen">⚙️</a>
        <button class="hamburger" type="button" aria-label="Menü" aria-expanded="false" data-role="hamburger">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <nav data-role="nav">
      <a href="#/dashboard" data-nav="dashboard">Dashboard</a>
      <a href="#/players" data-nav="players">Spieler</a>
      <a href="#/training" data-nav="training">Training</a>
      <a href="#/test/setup" data-nav="setup">Beep-Test</a>
      <a href="#/schedule" data-nav="schedule">Plan</a>
      <a href="#/drills" data-nav="drills">Drills</a>
      <a href="#/tactics" data-nav="tactics">Taktik</a>
      <a href="#/notes" data-nav="notes">Notizen</a>
      <a href="#/history" data-nav="history">Historie</a>
    </nav>
  </header>

  <main id="app"></main>

  <template id="tpl-dashboard">
    <section class="view">
      <div class="section-head">
        <h2>Dashboard</h2>
        <div>
          <label class="season-select">
            <span class="sr-only">Saison</span>
            <select data-role="season-select"></select>
          </label>
          <button class="btn small" data-action="share-backup">📤 App teilen</button>
          <button class="btn small" data-action="import-backup">Importieren</button>
          <button class="btn small" data-action="export-season-csv">Saison CSV</button>
          <button class="btn small" data-action="export-season-json">Saison JSON</button>
        </div>
      </div>

      <div class="dash-grid">
        <div class="dash-card">
          <div class="dash-label">Trainings</div>
          <div class="dash-big" data-role="trainings-count">0</div>
          <div class="dash-sub" data-role="next-training">—</div>
        </div>
        <div class="dash-card">
          <div class="dash-label">Anwesenheit Team</div>
          <div class="dash-big"><span data-role="team-att-pct">0</span>%</div>
          <div class="dash-sub" data-role="team-att-sub">—</div>
        </div>
        <div class="dash-card">
          <div class="dash-label">Freiwürfe Team</div>
          <div class="dash-big"><span data-role="team-ft-pct">0</span>%</div>
          <div class="dash-sub" data-role="team-ft-sub">—</div>
        </div>
      </div>

      <section class="form-of-week hidden" data-role="form-of-week">
        <h3 class="form-of-week-head">📈 Form der Woche</h3>
        <div class="form-of-week-grid" data-role="form-of-week-grid"></div>
      </section>

      <h3>Top Anwesende</h3>
      <ol class="ranking" data-role="top-att"></ol>

      <h3>Top Freiwurf-Schützen <span class="muted-chip">(min. 10 Versuche)</span></h3>
      <ol class="ranking" data-role="top-ft"></ol>
      <div class="empty empty--field hidden" data-role="top-ft-empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 17 4-8 4 4 6-8"/></svg>
        <p class="empty-body">Noch kein Schütze mit 10+ Versuchen.</p>
      </div>

      <h3>Wurfquoten pro Kategorie</h3>
      <div data-role="shot-cats"></div>
      <div class="empty empty--field hidden" data-role="shot-cats-empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 17 4-8 4 4 6-8"/></svg>
        <p class="empty-body">Noch keine Wurf-Daten.</p>
      </div>

      <div class="pos-head">
        <h3>Stats pro Position</h3>
        <label class="pos-sort-label">
          <span class="sr-only">Sortierung</span>
          <select data-role="position-sort">
            <option value="position">Position (PG → C)</option>
            <option value="players">Anzahl Spieler</option>
            <option value="ft">Freiwürfe %</option>
            <option value="fg">Feldwürfe %</option>
            <option value="attendance">Anwesenheit %</option>
          </select>
        </label>
      </div>
      <div class="position-grid" data-role="position-grid"></div>
      <div class="empty empty--field hidden" data-role="position-empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
        <p class="empty-body">Noch keine Positionen erfasst. Trage Positionen in den Spieler-Profilen ein.</p>
      </div>

      <h3>Team-Wurfkarte (Saison)</h3>
      <p class="muted" data-role="team-heat-meta"></p>
      <div class="court-wrap" data-role="team-heat-wrap">
        <svg class="court" viewBox="0 0 500 470" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
          <rect class="court-floor" x="10" y="10" width="480" height="450" stroke-width="2"/>
          <rect class="court-lane" x="160" y="10" width="180" height="190" stroke-width="2"/>
          <circle class="court-line" cx="250" cy="200" r="60" fill="none" stroke-width="2"/>
          <line class="court-line" x1="160" y1="200" x2="340" y2="200" stroke-width="2"/>
          <path class="court-line" d="M 210 50 A 40 40 0 0 0 290 50" fill="none" stroke-width="1.5"/>
          <line class="court-backboard" x1="220" y1="40" x2="280" y2="40" stroke-width="3"/>
          <circle class="court-rim" cx="250" cy="50" r="8" fill="none" stroke-width="2.5"/>
          <line class="court-line" x1="50" y1="10" x2="50" y2="135" stroke-width="2"/>
          <line class="court-line" x1="450" y1="10" x2="450" y2="135" stroke-width="2"/>
          <path class="court-line" d="M 50 135 A 200 200 0 0 0 450 135" fill="none" stroke-width="2"/>
          <g data-role="team-heat-cells"></g>
        </svg>
      </div>
      <div class="empty empty--field hidden" data-role="team-heat-empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m8 12 3 3 5-5"/></svg>
        <p class="empty-body">Noch keine Würfe auf der Karte erfasst.</p>
      </div>
    </section>
  </template>

  <template id="tpl-players">
    <section class="view">
      <div class="section-head">
        <h2>Spielerverwaltung</h2>
        <button class="btn primary" data-action="new-player">+ Neuer Spieler</button>
      </div>

      <form class="player-form hidden" data-role="player-form">
        <input type="hidden" name="id">
        <div class="form-row">
          <label>Name *<input name="name" type="text" required maxlength="60"></label>
          <label>Geburtsdatum<input name="birthDate" type="date"></label>
          <label>Position<input name="position" type="text" maxlength="40" placeholder="z.B. Mittelfeld"></label>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn primary">Speichern</button>
          <button type="button" class="btn" data-action="cancel">Abbrechen</button>
        </div>
      </form>

      <div class="tabs">
        <button class="tab active" data-tab="active">Aktiv</button>
        <button class="tab" data-tab="archived">Archiv</button>
      </div>

      <ul class="player-list" data-role="player-list"></ul>
      <div class="empty hidden" data-role="empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
        <p class="empty-headline">Noch keine Spieler angelegt</p>
        <p class="empty-body">Leg deinen ersten Spieler an, um loszulegen.</p>
        <button class="btn primary" data-action="new-player">+ Neuer Spieler</button>
      </div>
    </section>
  </template>

  <template id="tpl-setup">
    <section class="view">
      <div class="section-head">
        <h2>Test vorbereiten</h2>
        <a href="#/players" class="btn">← Zurück</a>
      </div>
      <form class="setup-form" data-role="setup-form">
        <div class="form-row">
          <label>Datum<input name="date" type="date" required></label>
          <label>Rundenlänge (m)<input name="distance" type="number" min="5" max="50" step="0.5" required></label>
          <label class="grow">Notiz<input name="note" type="text" maxlength="100" placeholder="z.B. Vorbereitungstraining"></label>
        </div>
        <div class="test-type-row">
          <label class="test-type-opt">
            <input type="radio" name="testType" value="leger" checked>
            <div>
              <div class="tt-name">Beep-Test (Léger)</div>
              <div class="tt-desc">Standard Multistage Shuttle Run · Start 8 km/h · Dauer-Beep ohne Pausen</div>
            </div>
          </label>
          <label class="test-type-opt">
            <input type="radio" name="testType" value="yoyoIR1">
            <div>
              <div class="tt-name">Yo-Yo IR1</div>
              <div class="tt-desc">Intermittent Recovery · Start 10 km/h · 10 s Gehpause nach jeder Round (40 m)</div>
            </div>
          </label>
        </div>
        <p class="muted" data-role="type-hint">Standard: 20 m. Bei anderer Länge werden die Beep-Intervalle automatisch angepasst.</p>

        <div class="select-head">
          <h3>Teilnehmer auswählen</h3>
          <div>
            <button type="button" class="btn small" data-action="select-all">Alle</button>
            <button type="button" class="btn small" data-action="select-none">Keinen</button>
          </div>
        </div>
        <ul class="select-list" data-role="select-list"></ul>
        <p class="empty hidden" data-role="no-players">Bitte zuerst Spieler anlegen.</p>

        <div class="form-actions">
          <button type="submit" class="btn primary big" data-role="start-btn">Test starten</button>
        </div>
      </form>
    </section>
  </template>

  <template id="tpl-run">
    <section class="view test-run">
      <div class="section-head">
        <button class="btn" data-action="back">← Verlassen</button>
        <label class="toggle"><input type="checkbox" data-role="voice" checked> Sprachansage</label>
      </div>
      <div class="test-display">
        <div class="level-box">
          <div class="label">Level</div>
          <div class="value" data-role="level">1</div>
        </div>
        <div class="shuttle-box">
          <div class="label">Shuttle</div>
          <div class="value"><span data-role="shuttle">0</span>/<span data-role="shuttle-max">7</span></div>
        </div>
        <div class="speed-box">
          <div class="label">Tempo</div>
          <div class="value"><span data-role="speed">8.0</span> km/h</div>
        </div>
      </div>

      <div class="progress">
        <div class="bar" data-role="progress-bar"></div>
      </div>
      <div class="next-beep"><span data-role="test-type-label">Beep-Test</span> · Nächster Beep in <span data-role="countdown">0.0</span> s · Runde: <span data-role="distance">20</span> m</div>
      <div class="rest-indicator" data-role="rest-indicator">⏸ Gehzone · <span data-role="rest-countdown">10</span> s</div>

      <div class="test-controls">
        <button class="btn primary big" data-action="start">Start</button>
        <button class="btn big" data-action="pause" disabled>Pause</button>
        <button class="btn danger" data-action="stop" disabled>Stop</button>
      </div>

      <h3>Aktive Läufer (<span data-role="active-count">0</span>)</h3>
      <ul class="runner-list" data-role="active-runners"></ul>

      <h3>Ausgeschieden (<span data-role="out-count">0</span>)</h3>
      <ul class="runner-list out" data-role="out-runners"></ul>
    </section>
  </template>

  <template id="tpl-training-list">
    <section class="view">
      <div class="section-head">
        <h2>Training</h2>
        <button class="btn primary" data-action="new-training">+ Neues Training</button>
      </div>
      <ul class="session-list" data-role="list"></ul>
      <div class="empty hidden" data-role="empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <p class="empty-headline">Noch keine Trainings erfasst</p>
        <p class="empty-body">Erstelle dein erstes Training, um Anwesenheit und Wurfstatistiken zu tracken.</p>
        <button class="btn primary" data-action="new-training">+ Neues Training</button>
      </div>
    </section>
  </template>

  <template id="tpl-training-detail">
    <section class="view">
      <div class="section-head">
        <div class="head-left">
          <a href="#/training" class="btn">← Zurück</a>
          <h2 data-role="title">Training</h2>
        </div>
        <div class="head-actions">
          <button class="btn small primary" data-action="end-training">🏁 Beenden</button>
          <details class="head-menu">
            <summary class="btn small head-menu-toggle" aria-label="Weitere Aktionen">⋯ Mehr</summary>
            <div class="head-menu-panel">
              <button class="btn small" data-action="share-summary">📤 Text teilen</button>
              <button class="btn small" data-action="ai-summary">🤖 KI-Zusammenfassung</button>
              <button class="btn small" data-action="export-csv">CSV exportieren</button>
              <button class="btn small" data-action="export-json">JSON exportieren</button>
              <button class="btn small danger" data-action="delete">Löschen</button>
            </div>
          </details>
        </div>
      </div>

      <div class="subnav" data-role="subnav">
        <button class="subnav-btn active" type="button" data-pane="overview">Übersicht</button>
        <button class="subnav-btn" type="button" data-pane="attendance">Anwesenheit</button>
        <button class="subnav-btn" type="button" data-pane="ft">Freiwürfe</button>
        <button class="subnav-btn" type="button" data-pane="shots">Würfe</button>
        <button class="subnav-btn" type="button" data-pane="fitness">Fitness</button>
        <button class="subnav-btn" type="button" data-pane="map">Karte</button>
        <button class="subnav-btn" type="button" data-pane="notes">Notizen</button>
      </div>

      <div class="pane" data-pane="overview">
        <div class="form-row">
          <label>Datum<input type="date" data-role="date" required></label>
          <label>Startzeit<input type="time" data-role="time" required></label>
        </div>

        <div class="plan-box hidden" data-role="plan-box">
          <div class="plan-head">📋 Plan</div>
          <div data-role="plan-summary"></div>
          <ol class="plan-drills" data-role="plan-drills"></ol>
        </div>

        <div class="timer-box" data-role="timer-box">
          <div class="timer-display" data-role="timer-display">00:00</div>
          <div class="timer-state" data-role="timer-state">Bereit</div>
          <div class="timer-controls">
            <button class="btn small" data-timer="60">1 min</button>
            <button class="btn small" data-timer="180">3 min</button>
            <button class="btn small" data-timer="300">5 min</button>
            <button class="btn small" data-timer="600">10 min</button>
            <input type="number" class="timer-custom" data-role="timer-custom" min="1" max="60" placeholder="min" step="1">
            <button class="btn small primary" data-timer-action="start">Start</button>
            <button class="btn small" data-timer-action="stop">Stop</button>
          </div>
        </div>

        <label class="block-label">Notiz zum Training
          <textarea data-role="note" rows="2" placeholder="z.B. Schwerpunkt Verteidigung"></textarea>
        </label>

        <div class="att-summary" data-role="summary"></div>

        <div class="team-quote-card" data-role="team-quote"></div>

        <div class="training-heatmap" data-role="training-heatmap-wrap">
          <h3 class="section-subhead">Team-Wurfkarte (dieses Training)</h3>
          <div class="court-wrap" data-role="training-heat-court-wrap">
            <svg class="court" viewBox="0 0 500 470" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
              <rect class="court-floor" x="10" y="10" width="480" height="450" stroke-width="2"/>
              <rect class="court-lane" x="160" y="10" width="180" height="190" stroke-width="2"/>
              <circle class="court-line" cx="250" cy="200" r="60" fill="none" stroke-width="2"/>
              <line class="court-line" x1="160" y1="200" x2="340" y2="200" stroke-width="2"/>
              <path class="court-line" d="M 210 50 A 40 40 0 0 0 290 50" fill="none" stroke-width="1.5"/>
              <line class="court-backboard" x1="220" y1="40" x2="280" y2="40" stroke-width="3"/>
              <circle class="court-rim" cx="250" cy="50" r="8" fill="none" stroke-width="2.5"/>
              <line class="court-line" x1="50" y1="10" x2="50" y2="135" stroke-width="2"/>
              <line class="court-line" x1="450" y1="10" x2="450" y2="135" stroke-width="2"/>
              <path class="court-line" d="M 50 135 A 200 200 0 0 0 450 135" fill="none" stroke-width="2"/>
              <g data-role="training-heat-cells"></g>
            </svg>
          </div>
          <div class="empty empty--field hidden" data-role="training-heat-empty">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m8 12 3 3 5-5"/></svg>
            <p class="empty-body">Keine Wurfpositionen erfasst. Öffne den <a href="#" data-action="goto-map">Karte-Tab</a>.</p>
          </div>
        </div>
      </div>

      <div class="pane hidden" data-pane="attendance">
        <div class="att-actions">
          <button class="btn small" data-action="reset-attendance">Anwesenheit zurücksetzen</button>
        </div>
        <ul class="attendance-list" data-role="attendance"></ul>
      </div>

      <div class="pane hidden" data-pane="ft">
        <div class="ft-summary" data-role="ft-summary"></div>
        <ul class="ft-list" data-role="freethrows"></ul>
        <div class="empty empty--field hidden" data-role="ft-empty">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
          <p class="empty-body">Keine anwesenden Spieler — Freiwürfe werden aktiv, sobald jemand als „Anwesend" markiert ist.</p>
        </div>
      </div>

      <div class="pane hidden" data-pane="shots">
        <div class="shot-categories" data-role="shot-tabs"></div>
        <div class="ft-summary" data-role="shot-summary"></div>
        <div class="shot-spot-bar hidden" data-role="spot-bar">
          <span class="muted spot-status" data-role="spot-status"></span>
          <a class="btn small" href="#/settings">📍 Spot in Einstellungen bearbeiten</a>
        </div>
        <ul class="ft-list" data-role="shots"></ul>
        <div class="empty empty--field hidden" data-role="shot-empty">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
          <p class="empty-body">Keine anwesenden Spieler.</p>
        </div>
      </div>

      <div class="pane hidden" data-pane="fitness">
        <p class="muted">Sprint, Rim Touches, Lane Agility, Sprungkraft — je Spieler ein Messwert pro Training. Leer lassen wenn nicht getestet.</p>
        <ul class="ft-list" data-role="fitness"></ul>
        <div class="empty empty--field hidden" data-role="fitness-empty">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
          <p class="empty-body">Keine anwesenden Spieler.</p>
        </div>
      </div>

      <div class="pane hidden" data-pane="map">
        <div class="map-controls">
          <label class="block-label" style="flex:1; margin:0">Spieler
            <select data-role="map-player"></select>
          </label>
          <div class="map-mode">
            <button type="button" class="btn small primary" data-map-mode="hit">✓ Treffer</button>
            <button type="button" class="btn small" data-map-mode="miss">✗ Fehlwurf</button>
          </div>
          <button type="button" class="btn small" data-action="map-undo">↶ Letzten zurück</button>
          <button type="button" class="btn small danger" data-action="map-clear">Alle löschen</button>
          <button type="button" class="btn small" data-action="map-generate" title="Aus Freiwurf- und Wurfzahlen alle anwesenden Spieler automatisch befüllen">🎯 Aus Zahlen befüllen</button>
        </div>
        <div class="court-wrap" data-role="court-wrap">
          <svg class="court" viewBox="0 0 500 470" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" data-role="court-svg">
            <rect class="court-floor" x="10" y="10" width="480" height="450" stroke-width="2"/>
            <rect class="court-lane" x="160" y="10" width="180" height="190" stroke-width="2"/>
            <circle class="court-line" cx="250" cy="200" r="60" fill="none" stroke-width="2"/>
            <line class="court-line" x1="160" y1="200" x2="340" y2="200" stroke-width="2"/>
            <path class="court-line" d="M 210 50 A 40 40 0 0 0 290 50" fill="none" stroke-width="1.5"/>
            <line class="court-backboard" x1="220" y1="40" x2="280" y2="40" stroke-width="3"/>
            <circle class="court-rim" cx="250" cy="50" r="8" fill="none" stroke-width="2.5"/>
            <line class="court-line" x1="50" y1="10" x2="50" y2="135" stroke-width="2"/>
            <line class="court-line" x1="450" y1="10" x2="450" y2="135" stroke-width="2"/>
            <path class="court-line" d="M 50 135 A 200 200 0 0 0 450 135" fill="none" stroke-width="2"/>
            <line class="court-line" x1="10" y1="460" x2="490" y2="460" stroke-width="2"/>

            <rect x="10" y="10" width="480" height="450" fill="transparent" data-role="court-hit"/>

        <div class="map-stats" data-role="map-stats"></div>

      <div class="pane hidden" data-pane="notes">
        <p class="muted">Persönliche Notiz pro Spieler für dieses Training (z.B. Gespräche, Auffälligkeiten, Hausaufgaben). Wird in der CSV mit exportiert.</p>

      </div>

      <p class="muted" data-role="saved-info">Änderungen werden automatisch gespeichert.</p>
    </section>
  </template>

  <template id="tpl-schedule">
    <section class="view">
      <h2>Trainingsplan</h2>

      <div class="player-form">
        <h3 style="margin-top:0">Reguläre Trainingszeiten</h3>
        <p class="muted">Wähle die Wochentage und die Uhrzeit. Die App berechnet daraus die nächsten Termine.</p>
        <div class="weekday-row" data-role="weekdays"></div>
        <div class="form-row">
          <label>Uhrzeit<input type="time" data-role="time"></label>
          <label>Anzahl Vorausschau<input type="number" data-role="lookahead" min="1" max="20" value="6"></label>
        </div>
        <div class="form-actions">
          <button class="btn primary" data-action="save-schedule">Speichern</button>
        </div>
      </div>

      <h3>Nächste Termine</h3>
      <ul class="session-list" data-role="upcoming"></ul>
      <div class="empty empty--field hidden" data-role="upcoming-empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <p class="empty-body">Bitte zuerst Wochentage auswählen.</p>
      </div>

      <h3>KI-Import (Plan aus PDF)</h3>
      <div class="player-form">
        <p class="muted">Lade einen Trainingsplan als PDF hoch — Gemini extrahiert Inhalte und füllt die nächsten Termine vor (Notiz, Freiwürfe, Wurf-Kategorien, Drill-Liste).</p>
        <label class="block-label">Gemini API Key
          <input type="password" data-role="api-key" placeholder="AIza..." autocomplete="off">
        </label>
        <p class="muted">Kostenlos bei <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a> anlegen. Wird nur lokal in deinem Browser gespeichert.</p>
        <div class="form-actions">
          <button class="btn" data-action="save-key">Key speichern</button>
          <button class="btn primary" data-action="upload-pdf">📄 Plan-PDF hochladen</button>
        </div>
        <p class="muted" data-role="ai-status"></p>
      </div>
    </section>
  </template>

  <template id="tpl-notes-list">
    <section class="view">
      <div class="section-head">
        <h2>Notizen</h2>
        <button class="btn primary" data-action="new-note">+ Neue Notiz</button>
      </div>
      <input type="search" class="search-input" data-role="search" placeholder="Suchen …">
      <ul class="notes-list" data-role="list"></ul>
      <div class="empty hidden" data-role="empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>
        <p class="empty-headline">Noch keine Notizen</p>
        <p class="empty-body">Halte Trainingsideen, Drills oder Beobachtungen fest.</p>
        <button class="btn primary" data-action="new-note">+ Neue Notiz</button>
      </div>
    </section>
  </template>

  <template id="tpl-note-detail">
    <section class="view">
      <div class="section-head">
        <div class="head-left">
          <a href="#/notes" class="btn">← Zurück</a>
        </div>
        <div>
          <button class="btn small" data-action="export">Exportieren</button>
          <button class="btn small danger" data-action="delete">Löschen</button>
        </div>
      </div>
      <input type="text" class="note-title" data-role="title" placeholder="Titel (optional)" maxlength="120">
      <textarea class="note-body" data-role="body" placeholder="Notiz schreiben …" rows="14"></textarea>
      <p class="muted" data-role="meta"></p>
    </section>
  </template>

  <template id="tpl-history">
    <section class="view">
      <div class="section-head">
        <h2>Historie</h2>
        <div>
          <button class="btn small" data-action="share-backup">Backup teilen</button>
          <button class="btn small" data-action="export-backup">Exportieren</button>
          <button class="btn small" data-action="import-backup">Importieren</button>
        </div>
      </div>
      <ul class="session-list" data-role="session-list"></ul>
      <div class="empty hidden" data-role="empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/><path d="m2 12 3-3 3 3"/></svg>
        <p class="empty-headline">Noch keine Tests absolviert</p>
        <p class="empty-body">Starte einen Beep-Test, um Ergebnisse hier zu sehen.</p>
      </div>
    </section>
  </template>

  <template id="tpl-player-detail">
    <section class="view">
      <div class="section-head">
        <div class="head-left">
          <a href="#/players" class="btn">← Zurück</a>
          <h2 data-role="name">Spieler</h2>
        </div>
        <button class="btn small" data-action="print-report">🖨 Bericht drucken / PDF</button>
      </div>
      <p class="muted" data-role="meta"></p>

      <h3>Saison-Statistik</h3>
      <div class="dash-grid" data-role="player-stats"></div>

      <div class="streak-tile" data-role="streak-tile"></div>

      <h3>Wurfquoten pro Kategorie</h3>
      <div data-role="player-shot-cats"></div>
      <div class="empty empty--field hidden" data-role="player-shot-empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 17 4-8 4 4 6-8"/></svg>
        <p class="empty-body">Noch keine Wurf-Daten.</p>
      </div>

      <h3>Trends über die Saison</h3>
      <div data-role="player-trends"></div>

      <h3>Saison-Wurfkarte</h3>
      <p class="muted" data-role="heatmap-meta"></p>
      <div class="court-wrap" data-role="player-heatmap-wrap">
        <svg class="court" viewBox="0 0 500 470" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" data-role="player-court">
          <rect class="court-floor" x="10" y="10" width="480" height="450" stroke-width="2"/>
          <rect class="court-lane" x="160" y="10" width="180" height="190" stroke-width="2"/>
          <circle class="court-line" cx="250" cy="200" r="60" fill="none" stroke-width="2"/>
          <line class="court-line" x1="160" y1="200" x2="340" y2="200" stroke-width="2"/>
          <path class="court-line" d="M 210 50 A 40 40 0 0 0 290 50" fill="none" stroke-width="1.5"/>
          <line class="court-backboard" x1="220" y1="40" x2="280" y2="40" stroke-width="3"/>
          <circle class="court-rim" cx="250" cy="50" r="8" fill="none" stroke-width="2.5"/>
          <line class="court-line" x1="50" y1="10" x2="50" y2="135" stroke-width="2"/>
          <line class="court-line" x1="450" y1="10" x2="450" y2="135" stroke-width="2"/>
          <path class="court-line" d="M 50 135 A 200 200 0 0 0 450 135" fill="none" stroke-width="2"/>
          <g data-role="player-heatmap-cells"></g>
          <g data-role="player-heatmap-shots"></g>
        </svg>
      </div>
      <div class="heatmap-controls">
        <label><input type="radio" name="heatmap-view" value="zones" checked> Zonen (mit Stats)</label>
        <label><input type="radio" name="heatmap-view" value="shots"> Einzelne Würfe</label>
      </div>
      <div class="empty empty--field hidden" data-role="heatmap-empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m8 12 3 3 5-5"/></svg>
        <p class="empty-body">Noch keine Würfe auf der Karte erfasst.</p>
      </div>

      <h3>Beep-Test Verlauf</h3>
      <div class="chart-wrap" data-role="chart"></div>
      <div class="empty empty--field hidden" data-role="no-data">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/><path d="m2 12 3-3 3 3"/></svg>
        <p class="empty-body">Noch keine Beep-Test-Ergebnisse für diesen Spieler.</p>
      </div>

      <h3>Beep-Test Ergebnisse</h3>
      <div class="table-scroll">
        <table class="results">
          <thead>
            <tr><th>Datum</th><th>Level</th><th>Shuttle</th><th>Gesamt</th><th>Runde</th><th>Meter</th><th>VO₂max</th><th>Bewertung</th></tr>
          </thead>
          <tbody data-role="rows"></tbody>
        </table>
      </div>
    </section>
  </template>

  <template id="tpl-session">
    <section class="view">
      <div class="section-head">
        <div class="head-left">
          <a href="#/history" class="btn">← Zurück</a>
          <h2 data-role="title">Test</h2>
        </div>
        <div>
          <button class="btn" data-action="export-csv">CSV exportieren</button>
          <button class="btn danger" data-action="delete">Löschen</button>
        </div>
      </div>
      <p class="muted" data-role="meta"></p>
      <div class="table-scroll">
        <table class="results">
          <thead>
            <tr><th>#</th><th>Spieler</th><th>Level</th><th>Shuttle</th><th>Gesamt-Shuttles</th><th>Meter</th><th>VO₂max</th><th>Bewertung</th></tr>
          </thead>
          <tbody data-role="rows"></tbody>
        </table>
      </div>
    </section>
  </template>

  <template id="tpl-drills-list">
    <section class="view">
      <div class="section-head">
        <h2>Drill-Bibliothek</h2>
        <div class="head-actions">
          <button class="btn small" data-action="import-from-trainings">📥 Aus Trainings</button>
          <button class="btn primary" data-action="new-drill">+ Neuer Drill</button>
        </div>
      </div>
      <div class="drill-filters">
        <input type="search" class="search-input" data-role="search" placeholder="Suchen …">
        <select data-role="category-filter">
          <option value="">Alle Kategorien</option>
        </select>
      </div>
      <ul class="drill-list" data-role="list"></ul>
      <div class="empty hidden" data-role="empty">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
        <p class="empty-headline">Noch keine Drills</p>
        <p class="empty-body">Leg deinen ersten Drill an — Name, Kategorie, Dauer und Beschreibung.</p>
        <button class="btn primary" data-action="new-drill">+ Neuer Drill</button>
      </div>
    </section>
  </template>

  <template id="tpl-drill-detail">
    <section class="view">
      <div class="section-head">
        <div class="head-left">
          <a href="#/drills" class="btn">← Zurück</a>
          <h2>Drill</h2>
        </div>
        <button class="btn small danger" data-action="delete">Löschen</button>
      </div>
      <form class="player-form" data-role="drill-form">
        <div class="form-row">
          <label>Name *<input type="text" name="name" required maxlength="80"></label>
          <label>Kategorie<input type="text" name="category" list="drill-categories" maxlength="40" placeholder="z.B. Shooting"></label>
          <label>Dauer (min)<input type="number" name="minutes" min="0" max="120" step="1"></label>
        </div>
        <datalist id="drill-categories"></datalist>
        <label class="block-label">Beschreibung
          <textarea name="description" rows="6" placeholder="Setup, Ablauf, Coaching-Points …"></textarea>
        </label>
        <p class="muted" data-role="meta"></p>
      </form>
    </section>
  </template>

  <template id="tpl-tactics">
    <section class="view">
      <div class="section-head">
        <h2>Taktikboard</h2>
        <div>
          <button class="btn small" data-action="save-as-note">💾 Als Notiz speichern</button>
          <button class="btn small danger" data-action="reset-board">Zurücksetzen</button>
        </div>
      </div>

      <div class="tactics-toolbar" role="toolbar" aria-label="Werkzeuge">
        <button type="button" class="tactics-tool active" data-tool="move" aria-pressed="true" aria-label="Verschieben" title="Verschieben"><span class="tool-icon" aria-hidden="true">✥</span><span class="tool-label">Verschieben</span></button>
        <button type="button" class="tactics-tool" data-tool="run" aria-label="Laufweg" title="Laufweg"><span class="tool-icon" aria-hidden="true">→</span><span class="tool-label">Laufweg</span></button>
        <button type="button" class="tactics-tool" data-tool="pass" aria-label="Passweg" title="Passweg"><span class="tool-icon" aria-hidden="true">⇢</span><span class="tool-label">Passweg</span></button>
        <button type="button" class="tactics-tool" data-tool="text" aria-label="Text" title="Text"><span class="tool-icon" aria-hidden="true">T</span><span class="tool-label">Text</span></button>
        <button type="button" class="tactics-tool" data-tool="erase" aria-label="Löschen" title="Löschen"><span class="tool-icon" aria-hidden="true">⌫</span><span class="tool-label">Löschen</span></button>
      </div>
      <p class="muted" data-role="tool-hint">Tippe einen Spieler oder den Ball und ziehe ihn an die gewünschte Stelle.</p>

      <div class="court-wrap tactics-court">
        <svg class="court" viewBox="0 0 500 470" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" data-role="tactics-svg">
          <defs>
            <marker id="arrow-run" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="var(--cta)"/>
            </marker>
            <marker id="arrow-pass" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="var(--primary)"/>
            </marker>
          </defs>
          <rect class="court-floor" x="10" y="10" width="480" height="450" stroke-width="2"/>
          <rect class="court-lane" x="160" y="10" width="180" height="190" stroke-width="2"/>
          <circle class="court-line" cx="250" cy="200" r="60" fill="none" stroke-width="2"/>
          <line class="court-line" x1="160" y1="200" x2="340" y2="200" stroke-width="2"/>
          <path class="court-line" d="M 210 50 A 40 40 0 0 0 290 50" fill="none" stroke-width="1.5"/>
          <line class="court-backboard" x1="220" y1="40" x2="280" y2="40" stroke-width="3"/>
          <circle class="court-rim" cx="250" cy="50" r="8" fill="none" stroke-width="2.5"/>
          <line class="court-line" x1="50" y1="10" x2="50" y2="135" stroke-width="2"/>
          <line class="court-line" x1="450" y1="10" x2="450" y2="135" stroke-width="2"/>
          <path class="court-line" d="M 50 135 A 200 200 0 0 0 450 135" fill="none" stroke-width="2"/>
          <g data-role="arrows-layer"></g>
          <g data-role="texts-layer"></g>
          <g data-role="tokens-layer"></g>
        </svg>
      </div>

      <div class="tactics-legend muted">O · Angriff (1–5) · ⬤ Ball · Laufweg (grün durchgezogen) · Passweg (orange gestrichelt)</div>
    </section>
  </template>

  <template id="tpl-drill-picker">
    <div class="modal-backdrop" data-role="modal-backdrop">
      <div class="modal" role="dialog" aria-label="Drill aus Bibliothek">
        <div class="modal-head">
          <h3>Drill aus Bibliothek</h3>
          <button type="button" class="btn small" data-action="close" aria-label="Schließen">✕</button>
        </div>
        <div class="modal-body">
          <div class="drill-filters">
            <input type="search" class="search-input" data-role="search" placeholder="Suchen …">
            <select data-role="category-filter">
              <option value="">Alle Kategorien</option>
            </select>
          </div>
          <ul class="drill-list" data-role="list"></ul>
          <p class="empty hidden" data-role="empty">Keine Drills in der Bibliothek. <a href="#/drills">Jetzt anlegen</a>.</p>
        </div>
      </div>

  <template id="tpl-settings">
    <section class="view">
      <div class="section-head">

          <h2>Einstellungen</h2>
        </div>

      <h3>Wurf-Spots (global)</h3>

      <div class="settings-spots">
        <div class="spot-cat-list" data-role="spot-cat-list"></div>
        <div class="court-wrap">
          <svg class="court" viewBox="0 0 500 470" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" data-role="settings-spot-svg">
            <rect class="court-floor" x="10" y="10" width="480" height="450" stroke-width="2"/>
            <rect class="court-lane" x="160" y="10" width="180" height="190" stroke-width="2"/>
            <circle class="court-line" cx="250" cy="200" r="60" fill="none" stroke-width="2"/>
            <line class="court-line" x1="160" y1="200" x2="340" y2="200" stroke-width="2"/>
            <path class="court-line" d="M 210 50 A 40 40 0 0 0 290 50" fill="none" stroke-width="1.5"/>
            <line class="court-backboard" x1="220" y1="40" x2="280" y2="40" stroke-width="3"/>
            <circle class="court-rim" cx="250" cy="50" r="8" fill="none" stroke-width="2.5"/>
            <line class="court-line" x1="50" y1="10" x2="50" y2="135" stroke-width="2"/>
            <line class="court-line" x1="450" y1="10" x2="450" y2="135" stroke-width="2"/>
            <path class="court-line" d="M 50 135 A 200 200 0 0 0 450 135" fill="none" stroke-width="2"/>
            <g data-role="settings-spot-markers"></g>
            <rect x="10" y="10" width="480" height="450" fill="transparent" data-role="settings-spot-hit"/>
          </svg>
        </div>
        <div class="spot-editor-controls">
          <label class="muted">Streuung (Radius): <input type="range" min="6" max="60" step="2" data-role="settings-spot-radius" value="22"> <span data-role="settings-spot-radius-val">22</span></label>
          <button type="button" class="btn small danger" data-action="settings-clear-spot">Spot der Kategorie löschen</button>
          <button type="button" class="btn small" data-action="settings-add-cat">+ Neue Kategorie</button>
        </div>
      </div>
    </section>
  </template>
